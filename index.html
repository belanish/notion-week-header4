<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Week 4</title>
  <style>
    .week-box {
      width: 1150px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: #f9f8f7;
      font-family: "Segoe UI", sans-serif;
      gap: 14px; /* 하트 사이 간격 */
    }

    /* 하트 크기별 */
    .heart-xs { font-size: 18px; color: #c21002; animation: pulse 1s infinite ease-in-out; }
	.heart-s { font-size: 20px; color: #c21002; animation: pulse 1s infinite ease-in-out; }
	.heart-sm { font-size: 25px; color: #c21002; animation: pulse 1s infinite ease-in-out; }
	.heart-m { font-size: 30px; color: #c21002; animation: pulse 1s infinite ease-in-out; }
	.heart-ml { font-size: 35px; color: #c21002; animation: pulse 1s infinite ease-in-out; }
    .heart-l { font-size: 40px; color: #c21002; animation: pulse 1s infinite ease-in-out; }
    .heart-lg { font-size: 45px; color: #c21002; animation: pulse 1s infinite ease-in-out; }

    /* WEEK 텍스트 */
    .week-text {
      font-size: 45px;
      font-weight: 900; /* Black 효과 */
      letter-spacing: 0.5px;
      margin: 0 20px; /* WEEK와 하트 사이 간격 */
      color: #00a5f1;
    }

    /* 하트 두근 애니메이션 */
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="week-box">
    <span class="heart-xs">♥</span>
	<span class="heart-s">♥</span>
	<span class="heart-sm">♥</span>
	<span class="heart-m">♥</span>
    <span class="heart-ml">♥</span>
	<span class="heart-l">♥</span>
    <span class="heart-lg">♥</span>

    <span class="week-text">WEEK 4</span>

    <span class="heart-lg">♥</span>
	<span class="heart-l">♥</span>
	<span class="heart-ml">♥</span>
	<span class="heart-sm">♥</span>
	<span class="heart-m">♥</span>
    <span class="heart-sm">♥</span>
    <span class="heart-xs">♥</span>
  </div>
</body>
</html>
